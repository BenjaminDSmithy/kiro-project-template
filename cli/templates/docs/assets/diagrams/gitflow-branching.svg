<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="8" fill="#0f172a"/>

  <!-- Branch labels (left side) -->
  <text x="28" y="62" fill="#f97316" font-weight="600" font-size="14">hotfix</text>
  <text x="28" y="122" fill="#22d3ee" font-weight="600" font-size="14">main</text>
  <text x="28" y="212" fill="#a78bfa" font-weight="600" font-size="14">release</text>
  <text x="28" y="292" fill="#4ade80" font-weight="600" font-size="14">develop</text>
  <text x="28" y="372" fill="#60a5fa" font-weight="600" font-size="14">feature</text>

  <!-- Main branch line -->
  <line x1="120" y1="120" x2="850" y2="120" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>

  <!-- Develop branch line -->
  <line x1="120" y1="290" x2="850" y2="290" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>

  <!-- Main branch commits -->
  <circle cx="160" cy="120" r="7" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5"/>
  <circle cx="480" cy="120" r="7" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5"/>
  <circle cx="700" cy="120" r="7" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5"/>
  <circle cx="820" cy="120" r="7" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5"/>

  <!-- Tags on main -->
  <rect x="455" y="78" width="52" height="20" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <text x="481" y="92" fill="#22d3ee" font-size="11" text-anchor="middle" font-weight="500">v1.0</text>
  <rect x="675" y="78" width="52" height="20" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <text x="701" y="92" fill="#22d3ee" font-size="11" text-anchor="middle" font-weight="500">v1.1</text>
  <rect x="795" y="78" width="52" height="20" rx="4" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <text x="821" y="92" fill="#22d3ee" font-size="11" text-anchor="middle" font-weight="500">v1.1.1</text>

  <!-- Develop branch commits -->
  <circle cx="160" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="220" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="380" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="500" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="560" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="640" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="720" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="840" cy="290" r="7" fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>

  <!-- Feature branch 1: feat/auth (branches from develop at 220, merges back at 380) -->
  <line x1="220" y1="290" x2="240" y2="370" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="240" y1="370" x2="340" y2="370" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="340" y1="370" x2="380" y2="290" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <circle cx="240" cy="370" r="6" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="290" cy="370" r="6" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="340" cy="370" r="6" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="270" y="400" fill="#60a5fa" font-size="10" text-anchor="middle" opacity="0.8">feat/auth</text>

  <!-- Feature branch 2: feat/ui (branches from develop at 500, merges back at 640) -->
  <line x1="500" y1="290" x2="520" y2="370" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="520" y1="370" x2="610" y2="370" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="610" y1="370" x2="640" y2="290" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <circle cx="520" cy="370" r="6" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="565" cy="370" r="6" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="610" cy="370" r="6" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="565" y="400" fill="#60a5fa" font-size="10" text-anchor="middle" opacity="0.8">feat/ui</text>

  <!-- Release branch v1.0 (branches from develop at 380, merges to main at 480, back to develop at 500) -->
  <line x1="380" y1="290" x2="400" y2="210" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="400" y1="210" x2="460" y2="210" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <line x1="460" y1="210" x2="480" y2="120" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="480" y1="120" x2="500" y2="290" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3" opacity="0.5"/>
  <circle cx="400" cy="210" r="6" fill="#0f172a" stroke="#a78bfa" stroke-width="2.5"/>
  <circle cx="430" cy="210" r="6" fill="#0f172a" stroke="#a78bfa" stroke-width="2.5"/>
  <circle cx="460" cy="210" r="6" fill="#0f172a" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="430" y="240" fill="#a78bfa" font-size="10" text-anchor="middle" opacity="0.8">release/1.0</text>

  <!-- Release branch v1.1 (branches from develop at 560, merges to main at 700, back to develop at 720) -->
  <line x1="560" y1="290" x2="580" y2="210" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="580" y1="210" x2="670" y2="210" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <line x1="670" y1="210" x2="700" y2="120" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="700" y1="120" x2="720" y2="290" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3" opacity="0.5"/>
  <circle cx="580" cy="210" r="6" fill="#0f172a" stroke="#a78bfa" stroke-width="2.5"/>
  <circle cx="625" cy="210" r="6" fill="#0f172a" stroke="#a78bfa" stroke-width="2.5"/>
  <circle cx="670" cy="210" r="6" fill="#0f172a" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="625" y="240" fill="#a78bfa" font-size="10" text-anchor="middle" opacity="0.8">release/1.1</text>

  <!-- Hotfix branch (branches from main at 700, merges to main at 820, back to develop at 840) -->
  <line x1="700" y1="120" x2="720" y2="55" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="720" y1="55" x2="790" y2="55" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="790" y1="55" x2="820" y2="120" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>
  <line x1="820" y1="120" x2="840" y2="290" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3" opacity="0.5"/>
  <circle cx="720" cy="55" r="6" fill="#0f172a" stroke="#f97316" stroke-width="2.5"/>
  <circle cx="755" cy="55" r="6" fill="#0f172a" stroke="#f97316" stroke-width="2.5"/>
  <circle cx="790" cy="55" r="6" fill="#0f172a" stroke="#f97316" stroke-width="2.5"/>
  <text x="755" y="42" fill="#f97316" font-size="10" text-anchor="middle" opacity="0.8">hotfix/security</text>

  <!-- Initial fork: main to develop -->
  <line x1="160" y1="120" x2="160" y2="290" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,3"/>

  <!-- Legend -->
  <rect x="120" y="10" width="12" height="3" rx="1" fill="#22d3ee"/>
  <text x="138" y="14" fill="#94a3b8" font-size="10">continuous branch</text>
  <line x1="240" y1="12" x2="270" y2="12" stroke="#64748b" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="278" y="14" fill="#94a3b8" font-size="10">branch / merge</text>
  <circle cx="370" cy="12" r="5" fill="#0f172a" stroke="#94a3b8" stroke-width="2"/>
  <text x="382" y="14" fill="#94a3b8" font-size="10">commit</text>
  <rect x="425" y="4" width="36" height="16" rx="3" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <text x="443" y="15" fill="#22d3ee" font-size="9" text-anchor="middle">tag</text>

</svg>
